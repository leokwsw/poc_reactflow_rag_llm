services:
  arangodb:
    image: arangodb:${ARANGO_VERSION}
    container_name: arangodb
    restart: unless-stopped
    env_file:
      - .env
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD}
    ports:
      - "${ARANGO_PORT}:8529"
    volumes:
      - arangodb-data:/var/lib/arangodb3
      - arangodb-apps:/var/lib/arangodb3-apps
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider --user root --password \"$${ARANGO_ROOT_PASSWORD}\" http://127.0.0.1:8529/_api/version",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  arangodb-data:
  arangodb-apps:
